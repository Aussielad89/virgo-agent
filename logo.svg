<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowWhite" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowLine">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="12" fill="#141416"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1e1e2a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Neural network connection lines (Virgo constellation shape) -->
  <g filter="url(#glowLine)" fill="none">
    <line x1="80" y1="80" x2="140" y2="120" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="140" y1="120" x2="200" y2="100" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="200" y1="100" x2="260" y2="140" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="260" y1="140" x2="310" y2="180" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="310" y1="180" x2="340" y2="260" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="260" y1="140" x2="230" y2="210" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="230" y1="210" x2="250" y2="290" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="230" y1="210" x2="170" y2="250" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="170" y1="250" x2="120" y2="300" stroke="#00ffff" stroke-width="1.8" opacity="0.6"/>
    <line x1="200" y1="100" x2="160" y2="180" stroke="#00ffff" stroke-width="1.2" opacity="0.35"/>
    <line x1="140" y1="120" x2="170" y2="250" stroke="#00ffff" stroke-width="1.2" opacity="0.35"/>
    <line x1="310" y1="180" x2="250" y2="290" stroke="#00ffff" stroke-width="1.2" opacity="0.35"/>
  </g>

  <!-- Spica highlight line (brightest star) -->
  <line x1="260" y1="140" x2="310" y2="180" stroke="#ffffff" stroke-width="2.2" opacity="0.8" filter="url(#glowLine)"/>

  <!-- Neural network nodes (Virgo constellation stars) -->
  <!-- Node 1 -->
  <circle cx="80" cy="80" r="5" fill="#ffffff" filter="url(#neon)"/>
  <circle cx="80" cy="80" r="12" fill="url(#glowWhite)" opacity="0.3"/>

  <!-- Node 2 -->
  <circle cx="140" cy="120" r="4" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="140" cy="120" r="10" fill="url(#glow)" opacity="0.4"/>

  <!-- Node 3 -->
  <circle cx="200" cy="100" r="5" fill="#ffffff" filter="url(#neon)"/>
  <circle cx="200" cy="100" r="12" fill="url(#glowWhite)" opacity="0.3"/>

  <!-- Node 4 - Spica (brightest) -->
  <circle cx="260" cy="140" r="7" fill="#ffffff" filter="url(#neon)"/>
  <circle cx="260" cy="140" r="18" fill="url(#glowWhite)" opacity="0.4"/>
  <circle cx="260" cy="140" r="4" fill="#00ffff"/>
  <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>

  <!-- Node 5 -->
  <circle cx="310" cy="180" r="4.5" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="310" cy="180" r="11" fill="url(#glow)" opacity="0.35"/>

  <!-- Node 6 -->
  <circle cx="340" cy="260" r="4" fill="#ffffff" filter="url(#neon)"/>
  <circle cx="340" cy="260" r="10" fill="url(#glowWhite)" opacity="0.25"/>

  <!-- Node 7 -->
  <circle cx="230" cy="210" r="3.5" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="230" cy="210" r="9" fill="url(#glow)" opacity="0.3"/>

  <!-- Node 8 -->
  <circle cx="250" cy="290" r="4" fill="#ffffff" filter="url(#neon)"/>
  <circle cx="250" cy="290" r="10" fill="url(#glowWhite)" opacity="0.25"/>

  <!-- Node 9 -->
  <circle cx="170" cy="250" r="3.5" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="170" cy="250" r="9" fill="url(#glow)" opacity="0.3"/>

  <!-- Node 10 -->
  <circle cx="120" cy="300" r="4" fill="#ffffff" filter="url(#neon)"/>
  <circle cx="120" cy="300" r="10" fill="url(#glowWhite)" opacity="0.25"/>

  <!-- Node 11 -->
  <circle cx="160" cy="180" r="3" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="160" cy="180" r="8" fill="url(#glow)" opacity="0.2"/>

  <!-- Pulsing data flow animations -->
  <circle cx="80" cy="80" r="3" fill="#ffffff" opacity="0.9">
    <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="140" r="4" fill="#ffffff" opacity="0.9">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom-right corner circuit-like accent lines -->
  <g stroke="#00ffff" stroke-width="0.8" opacity="0.25">
    <line x1="340" y1="340" x2="360" y2="340"/>
    <line x1="360" y1="320" x2="360" y2="340"/>
    <line x1="340" y1="340" x2="340" y2="360"/>
  </g>
  <circle cx="340" cy="340" r="1.5" fill="#00ffff" opacity="0.4"/>

  <!-- Top-left corner accent -->
  <g stroke="#00ffff" stroke-width="0.8" opacity="0.2">
    <line x1="40" y1="40" x2="60" y2="40"/>
    <line x1="60" y1="40" x2="60" y2="50"/>
  </g>
</svg>
